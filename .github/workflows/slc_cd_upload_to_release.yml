name: SLC-CI-Upload-Flavors

on:
  workflow_call:
    inputs:
      flavor:
        description: 'A flavor'
        required: true
        type: string
      release-name:
        description: 'The name of the GitHub release.'
        required: true
        type: string

    secrets:
      CI4_DOCKERHUB_USERNAME:
        required: true
      CI4_DOCKERHUB_TOKEN:
        required: true

jobs:

  detect-runner:
    runs-on: ubuntu-24.04
    steps:
     - uses: actions/checkout@v6
       with:
          submodules: 'recursive'

     - name: Setup Python & Poetry Environment
       uses: exasol/python-toolbox/.github/actions/python-environment@v5
       with:
          python-version: "3.10"
          poetry-version: "2.3.0"

     - name: Detect runner
       id: detect-runner
       run: poetry run -- exaslc-ci get-build-runners --flavor "$FLAVOR" --github-output-var runner-matrix
       env:
         FLAVOR: ${{ inputs.flavor }}

    outputs:
     runner-matrix: ${{ steps.detect-runner.outputs.runner-matrix }}

  upload-release-slc:
    needs: detect-runner
    strategy:
      matrix:
        runner: ${{ fromJson(needs.detect-runner.outputs.runner-matrix) }}
    runs-on:
      labels: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
            submodules: 'recursive'

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v5
        with:
          python-version: "3.10"
          poetry-version: "2.3.0"

      - name: Detect Platform
        id: detect-platform
        run: poetry run -- exaslc-ci get-platform --github-output-var platform_machine

      - name: Download SLC
        id: download-slc
        uses: actions/download-artifact@v7
        with:
          name: slc-${{ inputs.flavor }}-release-${{ steps.detect-platform.outputs.platform_machine }}
          path: "slc"

      - name: Upload to release
        run: gh release upload "${{ inputs.release-name }}" slc/* || echo "Upload failed due to size, see workflow logs."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
