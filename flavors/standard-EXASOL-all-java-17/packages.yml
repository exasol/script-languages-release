build_steps:
- name: udfclient_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: coreutils
        version: 8.32-4.1ubuntu1.2
      - name: locales
        version: 2.35-0ubuntu3.13
      - name: libnss-db
        version: 2.2.3pre1-6ubuntu3
      - name: libzmq3-dev
        version: 4.3.4-2
      - name: libprotobuf-dev
        version: 3.12.4-1ubuntu7.22.04.6
      - name: libssl-dev
        version: 3.0.2-0ubuntu1.21
    variables:
      PROTOBUF_LIBRARY_PREFIX: /usr/lib/
      PROTOBUF_INCLUDE_PREFIX: /usr/include/
      ZMQ_LIBRARY_PREFIX: /usr/lib
      ZMQ_INCLUDE_PREFIX: /usr/include
  validation_cfg:
    version_mandatory: true
- name: language_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: ca-certificates
        version: 20240203~22.04.1
      - name: curl
        version: 7.81.0-1ubuntu1.23
      - name: openjdk-17-jdk-headless
        version: 17.0.18+8-1~22.04.1
    variables:
      JAVA_PREFIX: /usr/lib/jvm/java-17-openjdk-{% if platform == 'x86_64' %}amd64{% else %}arm64{% endif %}
  validation_cfg:
    version_mandatory: true
- name: flavor_base_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: coreutils
        version: 8.32-4.1ubuntu1.2
      - name: locales
        version: 2.35-0ubuntu3.13
  validation_cfg:
    version_mandatory: true
version: 1.0.0
