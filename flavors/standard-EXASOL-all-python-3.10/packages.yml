build_steps:
- name: udfclient_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: coreutils
        version: 8.32-4.1ubuntu1.2
      - name: locales
        version: 2.35-0ubuntu3.13
      - name: libnss-db
        version: 2.2.3pre1-6ubuntu3
      - name: libzmq3-dev
        version: 4.3.4-2
      - name: libprotobuf-dev
        version: 3.12.4-1ubuntu7.22.04.6
      - name: libssl-dev
        version: 3.0.2-0ubuntu1.21
    variables:
      PROTOBUF_LIBRARY_PREFIX: /usr/lib/
      PROTOBUF_INCLUDE_PREFIX: /usr/include/
      ZMQ_LIBRARY_PREFIX: /usr/lib
      ZMQ_INCLUDE_PREFIX: /usr/include
  validation_cfg:
    version_mandatory: true
- name: language_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: ca-certificates
        version: 20240203~22.04.1
      - name: python3.10-dev
        version: 3.10.12-1~22.04.15
      - name: python3-distutils
        version: 3.10.8-1~22.04
      - name: curl
        version: 7.81.0-1ubuntu1.23
      - name: chrpath
        version: 0.16-2
    variables:
      PYTHON3_PREFIX: /usr
      PYTHON3_VERSION: python3.10
  - name: phase_python_binary
    tools:
      python_binary_path: /usr/bin/python3.10
  - name: install_pip
    tools:
      pip:
        version: '21.3.1'
        needs_break_system_packages: false
  - name: install_pip_packages
    pip:
      install_build_tools_ephemerally: false
      packages:
      - extras: []
        name: pandas
        version: ==2.2.3
      - extras: []
        name: numpy
        version: ==1.26.4
      - extras: []
        name: pyarrow
        version: ==16.0.0
  validation_cfg:
    version_mandatory: true
- name: flavor_base_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: unzip
        version: 6.0-26ubuntu3.2
      - name: git
        version: 1:2.34.1-1ubuntu1.17
      - name: libcurl4-openssl-dev
        version: 7.81.0-1ubuntu1.22
      - name: openssl
        version: 3.0.2-0ubuntu1.21
      - comment: Needed by python-ldap
        name: libsasl2-dev
        version: 2.1.27+dfsg2-3ubuntu1.2
      - name: libldap2-dev
        version: 2.5.20+dfsg-0ubuntu0.22.04.1
      - name: slapd
        version: 2.5.20+dfsg-0ubuntu0.22.04.1
      - name: ldap-utils
        version: 2.5.20+dfsg-0ubuntu0.22.04.1
      - name: libsmbclient
        version: 2:4.15.13+dfsg-0ubuntu1.10
      - name: libsmbclient-dev
        version: 2:4.15.13+dfsg-0ubuntu1.10
      - name: smbclient
        version: 2:4.15.13+dfsg-0ubuntu1.10
      - name: libgomp1
        version: 12.3.0-1ubuntu1~22.04.3
      - name: tzdata
        version: 2025b-0ubuntu0.22.04.1
  - name: install_pip_packages
    pip:
      install_build_tools_ephemerally: true
      packages:
      - extras: []
