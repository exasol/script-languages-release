build_steps:
- name: udfclient_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: coreutils
        version: 9.4-3ubuntu*
      - name: adduser
        version: 3.137ubuntu*
      - name: locales
        version: 2.39-0ubuntu*
      - name: libnss-db
        version: 2.2.3pre1-9build3
      - name: libzmq3-dev
        version: 4.3.5-1build2
      - name: cppzmq-dev
        version: 4.10.0-1build1
      - name: libprotobuf-dev
        version: 3.21.12-8.2ubuntu*
      - name: libssl-dev
        version: 3.0.13-0ubuntu*
    variables:
      PROTOBUF_LIBRARY_PREFIX: /usr/lib/
      PROTOBUF_INCLUDE_PREFIX: /usr/include/
      ZMQ_LIBRARY_PREFIX: /usr/lib
      ZMQ_INCLUDE_PREFIX: /usr/include
  validation_cfg:
    version_mandatory: true
- name: language_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: ca-certificates
        version: '20240203'
      - name: python3.12-dev
        version: 3.12.3-1ubuntu*
      - name: curl
        version: 8.5.0-2ubuntu*
      - name: chrpath
        version: 0.16-2build1
    variables:
      PYTHON3_PREFIX: /usr
      PYTHON3_VERSION: python3.12
  - name: phase_python_binary
    tools:
      python_binary_path: /usr/bin/python3.12
  - name: install_pip
    tools:
      pip:
        version: '25.2'
        needs_break_system_packages: true
  - name: install_pip_packages
    pip:
      install_build_tools_ephemerally: false
      packages:
      - extras: []
        name: pandas
        version: ==2.3.2
      - comment: Pinned to old version because of sagemaker
        extras: []
        name: numpy
        version: ==1.26.4
      - extras: []
        name: pyarrow
        version: ==21.0.0
  validation_cfg:
    version_mandatory: true
- name: flavor_base_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: unzip
        version: 6.0-28ubuntu*
      - name: git
        version: 1:2.43.0-1ubuntu*
      - name: libcurl4-openssl-dev
        version: 8.5.0-2ubuntu*
      - name: openssl
        version: 3.0.13-0ubuntu*
      - comment: Needed by python-ldap
        name: libsasl2-dev
        version: 2.1.28+dfsg1-5ubuntu*
      - name: libldap2-dev
        version: 2.6.10+dfsg-0ubuntu*
      - name: slapd
        version: 2.6.10+dfsg-0ubuntu*
      - name: ldap-utils
        version: 2.6.10+dfsg-0ubuntu*
      - name: libsmbclient-dev
        version: 2:4.19.5+dfsg-4ubuntu*
      - name: smbclient
        version: 2:4.19.5+dfsg-4ubuntu*
      - name: libgomp1
        version: 14.2.0-4ubuntu*
      - name: tzdata
        version: 2025b-0ubuntu*
      - name: libleveldb-dev
        version: 1.23-5build1
  - name: install_pip_packages
    pip:
      install_build_tools_ephemerally: true
      packages:
