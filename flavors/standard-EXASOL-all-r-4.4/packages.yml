build_steps:
- name: udfclient_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: coreutils
        version: 8.32-4.1ubuntu1.2
      - name: locales
        version: 2.35-0ubuntu3.13
      - name: libnss-db
        version: 2.2.3pre1-6ubuntu3
      - name: libzmq3-dev
        version: 4.3.4-2
      - name: libprotobuf-dev
        version: 3.12.4-1ubuntu7.22.04.6
      - name: libssl-dev
        version: 3.0.2-0ubuntu1.21
    variables:
      PROTOBUF_LIBRARY_PREFIX: /usr/lib/
      PROTOBUF_INCLUDE_PREFIX: /usr/include/
      ZMQ_LIBRARY_PREFIX: /usr/lib
      ZMQ_INCLUDE_PREFIX: /usr/include
  validation_cfg:
    version_mandatory: true
- name: language_deps
  phases:
  - name: install_gpg
    apt:
      packages:
      - name: ca-certificates
        version: 20240203~22.04.1
      - name: gnupg
        version: 2.2.27-3ubuntu2.5
  - name: install_apt_packages
    apt:
      repos:
        cran-r:
          key_url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xE298A3A825C0D65DFD57CBB651716619E084DAB9
          entry: deb [signed-by=/usr/share/keyrings/cran-r.gpg] https://cloud.r-project.org/bin/linux/ubuntu
            jammy-cran40/
          out_file: jammy-cran40.list
      packages:
      - name: curl
        version: 7.81.0-1ubuntu1.23
      - comment: Overrides version used by r-base-core/r-base-dev
        name: libexpat1
        version: 2.4.7-1ubuntu0.7
      - comment: Overrides version used by r-base-core/r-base-dev
        name: libexpat1-dev
        version: 2.4.7-1ubuntu0.7
      - name: r-base-core
        version: 4.5.2-1.2204.0
      - name: r-base-dev
        version: 4.5.2-1.2204.0
  - name: phase_r_binary
    tools:
      r_binary_path: /usr/bin/Rscript
  validation_cfg:
    version_mandatory: true
- name: flavor_base_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: unzip
        version: 6.0-26ubuntu3.2
      - name: wget
        version: 1.21.2-2ubuntu1.1
      - name: git
        version: 1:2.34.1-1ubuntu1.17
      - name: unixodbc-dev
        version: 2.3.9-5ubuntu0.1
      - name: cmake
        version: 3.22.1-1ubuntu1.22.04.2
      - name: libcurl4-openssl-dev
        version: 7.81.0-1ubuntu1.23
      - name: libhiredis-dev
        version: 0.14.1-2
  - name: install_r_packages
    r:
      packages:
      - name: acepack
        version: 1.4.2
      - name: chron
        version: 2.3-61
      - name: data.table
        version: 1.17.4
      - name: digest
        version: 0.6.37
      - name: fastcluster
        version: 1.2.6
      - name: flashClust
        version: 1.01-2
      - name: Formula
        version: 1.2-5
      - name: gtools
        version: 3.9.5
      - name: iterators
        version: 1.0.14
      - name: magrittr
        version: 2.0.4
      - name: nloptr
        version: 2.0.3
      - name: profileModel
        version: 0.6.1
      - name: proto
        version: 1.0.0
      - name: randomForest
        version: 4.7-1.2
      - name: Rcpp
        version: 1.0.12
      - name: RODBC
        version: 1.3-23
      - name: XML
        version: 3.99-0.16.1
      - name: jsonlite
        version: 1.8.8
      - name: rjson
        version: 0.2.21
      - name: yaml
        version: 2.3.8
      - name: glue
        version: 1.7.0
      - name: SparseM
        version: '1.81'
      - name: brglm
        version: 0.7.2
      - name: minqa
        version: 1.2.6
      - name: plyr
        version: 1.8.9
      - name: foreach
        version: 1.5.2
      - name: purrr
        version: 1.0.2
      - name: stringr
        version: 1.5.1
      - name: htmltools
        version: 0.5.8.1
      - name: RCurl
        version: 1.98-1.14
      - name: e1071
        version: 1.7-14
      - name: redux
        version: 1.1.4
      - name: reshape2
        version: 1.4.4
      - name: scales
        version: 1.4.0
      - name: lme4
        version: 1.1-35.3
      - name: gbm
        version: 2.1.9
      - name: httr
        version: 1.4.7
      - name: BradleyTerry2
        version: 1.1-2
      - name: tibble
        version: 3.2.1
      - name: dplyr
        version: 1.2.0
      - name: tidyr
        version: 1.3.1
      - name: oysteR
        version: 0.1.1
      - name: caret
        version: 6.0-94
      - name: caretEnsemble
        version: 2.0.3
  validation_cfg:
    version_mandatory: true
version: 1.0.0
