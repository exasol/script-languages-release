build_steps:
- name: udfclient_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: coreutils
        version: 8.32-4.1ubuntu1.2
      - name: locales
        version: 2.35-0ubuntu3.13
      - name: libnss-db
        version: 2.2.3pre1-6ubuntu3
      - name: libzmq3-dev
        version: 4.3.4-2
      - name: libprotobuf-dev
        version: 3.12.4-1ubuntu7.22.04.6
      - name: libssl-dev
        version: 3.0.2-0ubuntu1.21
    variables:
      PROTOBUF_LIBRARY_PREFIX: /usr/lib/
      PROTOBUF_INCLUDE_PREFIX: /usr/include/
      ZMQ_LIBRARY_PREFIX: /usr/lib
      ZMQ_INCLUDE_PREFIX: /usr/include
  validation_cfg:
    version_mandatory: true
- name: language_deps
  phases:
  - name: install_gpg
    apt:
      packages:
      - name: ca-certificates
        version: 20240203~22.04.1
      - name: gnupg
        version: 2.2.27-3ubuntu2.5
  - name: install_apt_packages
    apt:
      repos:
        cran-r:
          key_url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xE298A3A825C0D65DFD57CBB651716619E084DAB9
          entry: deb [signed-by=/usr/share/keyrings/cran-r.gpg] https://cloud.r-project.org/bin/linux/ubuntu
            jammy-cran40/
          out_file: jammy-cran40.list
      packages:
      - name: python3.10-dev
        version: 3.10.12-1~22.04.15
      - name: python3-distutils
        version: 3.10.8-1~22.04
      - name: curl
        version: 7.81.0-1ubuntu1.23
      - name: openjdk-11-jdk-headless
        version: 11.0.30+7-1ubuntu1~22.04
      - name: chrpath
        version: 0.16-2
      - name: libexpat1
        version: 2.4.7-1ubuntu0.7
        comment: Overrides version used by r-base-core/r-base-dev
      - name: libexpat1-dev
        version: 2.4.7-1ubuntu0.7
        comment: Overrides version used by r-base-core/r-base-dev
      - name: r-base-core
        version: 4.5.2-1.2204.0
      - name: r-base-dev
        version: 4.5.2-1.2204.0
    variables:
      PYTHON3_PREFIX: /usr
      PYTHON3_VERSION: python3.10
      JAVA_PREFIX: /usr/lib/jvm/java-11-openjdk-amd64
  - name: phase_python_binary
    tools:
      python_binary_path: /usr/bin/python3.10
      r_binary_path: /usr/bin/Rscript
  - name: install_pip
    tools:
      pip:
        version: '21.3.1'
        needs_break_system_packages: false
  - name: install_pip_packages
    pip:
      packages:
      - name: pandas
        version: ==2.2.3
        extras: []
      - name: numpy
        version: ==1.26.4
        extras: []
      - name: pyarrow
        version: ==16.0.0
        extras: []
      install_build_tools_ephemerally: false
  validation_cfg:
    version_mandatory: true
- name: flavor_base_deps_apt
  phases:
  - name: install_apt_packages
    apt:
      repos:
        trivy:
          key_url: https://aquasecurity.github.io/trivy-repo/deb/public.key
          entry: deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb
            generic main
          out_file: trivy.list
      packages:
      - name: unzip
        version: 6.0-26ubuntu3.2
      - name: git
        version: 1:2.34.1-1ubuntu1.17
      - name: libcurl4-openssl-dev
        version: 7.81.0-1ubuntu1.23
      - name: build-essential
        version: 12.9ubuntu3
      - name: wget
        version: 1.21.2-2ubuntu1.1
      - name: maven
        version: 3.6.3-5
      - name: libldb2
        version: 2:2.4.4-0ubuntu0.22.04.2
      - name: libleveldb1d
        version: 1.23-3build1
      - name: openssl
        version: 3.0.2-0ubuntu1.21
      - name: libldap2-dev
        version: 2.5.20+dfsg-0ubuntu0.22.04.1
      - name: libsasl2-dev
        version: 2.1.27+dfsg2-3ubuntu1.2
        comment: Needed by python-ldap
      - name: slapd
        version: 2.5.20+dfsg-0ubuntu0.22.04.1
      - name: ldap-utils
        version: 2.5.20+dfsg-0ubuntu0.22.04.1
      - name: unixodbc-dev
        version: 2.3.9-5ubuntu0.1
      - name: libxml2-dev
        version: 2.9.13+dfsg-1ubuntu0.11
      - name: apt-transport-https
        version: 2.4.14
      - name: gnupg
        version: 2.2.27-3ubuntu2.5
      - name: libhiredis-dev
        version: 0.14.1-2
      - name: libsmbclient
        version: 2:4.15.13+dfsg-0ubuntu1.10
      - name: libsmbclient-dev
        version: 2:4.15.13+dfsg-0ubuntu1.10
      - name: smbclient
        version: 2:4.15.13+dfsg-0ubuntu1.10
      - name: cmake
        version: 3.22.1-1ubuntu1.22.04.2
      - name: trivy
        version: 0.69.3
  validation_cfg:
    version_mandatory: true
